################################################################################
# Конфигурационный файл Gst-nvdewarper (DeepStream)
# Задача: убрать дисторсию "рыбий глаз" (fisheye) и получить нормальное
# перспективное изображение.
#
# Список projection-type (актуален для DeepStream 6.2+):
#  1  Fisheye -> PushBroom
#  2  Fisheye -> VertRadCyl (вертикальный цилиндр)
#  3  Perspective -> Perspective (коррекция обычного объектива)
#  4  Fisheye -> Perspective   <-- нужен нам для устранения "рыбьего глаза"
#  5  Fisheye -> Fisheye
#  6  Fisheye -> Cylindrical
#  7  Fisheye -> Equirectangular
#  8  Fisheye -> Panini
#  9  Perspective -> Equirectangular
#  10 Perspective -> Panini
#  11-18 варианты с Equirectangular источником
################################################################################

# ---- Глобальные параметры ----
[property]
output-width=2752
output-height=1728
# output-width=1920
# output-height=1080
num-batch-buffers=1

[surface0]
# 4 = Fisheye -> Perspective: разворачивает круглое fisheye-изображение
# в привычную "плоскую" картинку без искривления линий
projection-type=4
surface-index=0

# Итоговое разрешение этой поверхности
width=2752
height=1728
# width=1920
# height=1080

# --- Параметры исходного (fisheye) объектива ---
# Вертикальный угол обзора источника в градусах (обычно 180 для fisheye)
src-fov=120

# Фокусное расстояние источника в пикселях/радиан.
# Если не задано - вычисляется автоматически из src-fov.
# focal-length=300

# Коэффициенты дисторсии объектива (k0;k1;k2;k3).
# Если у вас нет данных калибровки конкретной камеры - оставьте нули,
# так nvdewarper будет использовать модель "идеального" fisheye-объектива.
distortion=0;0;0;0;0

# Центр проекции источника (по умолчанию - центр кадра, менять не нужно,
# если камера физически не смещена/не обрезана)
# src-x0=959.5
# src-y0=539.5

# --- Параметры виртуальной "выходной" камеры ---
# Поворот виртуальной камеры (0 = смотрим прямо по центру исходного кадра)
pitch=0
yaw=0
roll=0

# Углы обзора результирующего перспективного изображения.
# Чем меньше диапазон - тем более "приближенный" и менее искажённый вид
top-angle=-50
bottom-angle=50

# Режим обработки краёв кадра при дисторсии
# 0 = clamp (растянуть крайний пиксель), 1 = border (прозрачный чёрный)
cuda-address-mode=0
